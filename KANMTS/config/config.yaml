


# =========================================
# 1. Configurações de Dados e Arquitetura
# =========================================
root_path: './data/02-preprocessed/'
data_path: 'output.csv'
data: 'PETR4'

features: 'M'

enc_in: 15
dec_in: 15
c_out: 15
n_time_features: 5
seq_len: 4
label_len: 2
pred_len: 4
batch_size: 64


# =========================================
# 2. Treinamento
# =========================================
learning_rate: 0.0002164925715984288
lradj: 'cosine'
train_epochs: 1
patience: 3
dropout: 0.1

# =========================================
# 3. Configurações do KAN (Grades)
# =========================================
model: 'KANMTS'
grid_size: 5
freq: '15min'

d_model: 512
d_core: 64
d_ff: 256
e_layers: 3
activation: 'gelu'
use_norm: true
scale: true
scale_aux: true
embed: 'TimeF'
timeenc: 1'




# =========================================
# 4. Hardware e Sistema
# =========================================
checkpoints: './artifacts/checkpoints/'
num_workers: 0
use_gpu: true
gpu: '0'
save_model: true
hidden_dim: 20
use_multi_gpu: false
use_amp: false
output_attention: false
seasonal_patterns: null